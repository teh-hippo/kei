name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "user-reported"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: checkboxes
    id: adp-check
    attributes:
      label: Advanced Data Protection
      description: kei's iCloud web session needs iCloud.com Photos access. Bugs that only reproduce with web access disabled are not actionable here.
      options:
        - label: I have confirmed that ADP is disabled and "Access iCloud Data on the Web" is enabled
          required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What actually happened?
      placeholder: Describe what you saw, including any error messages or unexpected output.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, config, or commands to reproduce the issue.
      placeholder: |
        ```toml
        # config.toml (if applicable)
        ```

        ```sh
        kei sync --config ~/.config/kei/config.toml ...
        ```
      render: markdown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `kei --version`, or the Docker image tag."
      placeholder: "kei 0.22.8"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Docker
        - Homebrew
        - GitHub release binary
        - Built from source
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Logs, screenshots, config snippets, or links. Redact Apple IDs, passwords, session cookies, bearer tokens, webhook URLs, and local paths you do not want public.
    validations:
      required: false
