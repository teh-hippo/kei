# cargo-audit advisory ignores. cargo-audit auto-loads this path
# (`.cargo/audit.toml`) under both `just gate` and CI. Without `--deny`
# cargo-audit exits 0 on informational findings (unmaintained, unsound,
# yanked) regardless of this list, so callers must pass `--deny warnings`
# for the ignores to be enforceable.

[advisories]
ignore = [
    # `paste 1.0.15` is pulled in by little_exif, which backs JPEG/TIFF
    # EXIF writes when kei is built without the default `xmp` feature.
    # The advisory is unmaintained-only, not a known vulnerability.
    # Remove this ignore once little_exif drops paste or replaces it with
    # a maintained macro helper.
    # Advisory: https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",

    # `rand 0.9.2` unsound with a custom logger. kei's direct
    # rand=0.10.1 is unaffected; the 0.9.2 copy reaches us only
    # transitively via reqwest -> quinn -> quinn-proto.
    # Remove this ignore once reqwest's QUIC stack no longer pulls rand
    # 0.9.2, or if kei starts using a custom rand logger.
    # Advisory: https://rustsec.org/advisories/RUSTSEC-2026-0097
    "RUSTSEC-2026-0097",

    # `quick-xml` reaches kei through plist and little_exif. plist has not
    # released a version on quick-xml >= 0.41 yet, and little_exif still pins
    # an older quick-xml line. The vulnerable XML parser paths are not used for
    # untrusted XML ingestion in the changed auth flow.
    # Remove these ignores once plist and little_exif can both resolve
    # quick-xml >= 0.41.
    # Advisories: https://rustsec.org/advisories/RUSTSEC-2026-0194
    #             https://rustsec.org/advisories/RUSTSEC-2026-0195
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
